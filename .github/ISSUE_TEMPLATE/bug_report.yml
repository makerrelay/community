name: Bug report
description: Report something broken on MakerRelay.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: Where did this happen?
      placeholder: https://makerrelay.com/...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser or device
      placeholder: Chrome on macOS, Safari on iPhone, etc.
    validations:
      required: false

